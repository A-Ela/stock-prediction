services:
  - type: web
    name: stock-prediction-backend
    env: node
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    plan: starter

  - type: web
    name: stock-prediction-ai-service
    env: python
    branch: main
    rootDir: ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    plan: starter
